<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Merge PDF</title><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script><style>
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:rgba(255,255,255,.12);--accent:#4f7cff;--red:#ef4444;--text:#e8eaf0;--muted:#9ca3c0;--muted2:#5d6480;--green:#22c55e;--orange:#f97316}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}header{height:58px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 18px;position:sticky;top:0;z-index:2}.logo{font-weight:700;letter-spacing:-.02em}.logo span{color:var(--accent)}main{max-width:1100px;margin:0 auto;padding:24px}.grid{display:grid;grid-template-columns:380px 1fr;gap:20px}.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:0 12px 35px rgba(0,0,0,.22)}.drop{border:2px dashed var(--border);border-radius:14px;padding:26px;text-align:center;cursor:pointer;background:rgba(255,255,255,.02);transition:.2s}.drop:hover,.drop.drag{border-color:var(--accent);background:rgba(79,124,255,.07)}.drop h2{font-size:18px;margin:0 0 8px}.drop p{margin:0;color:var(--muted);font-size:13px}.btn{border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:9px 13px;border-radius:9px;cursor:pointer;font-weight:600}.btn:hover{filter:brightness(1.12)}.btn.primary{background:var(--accent);border-color:var(--accent);color:white}.btn.danger{background:rgba(239,68,68,.13);border-color:rgba(239,68,68,.35);color:#fecaca}.btn.green{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.35);color:#bbf7d0}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.file-list{list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:8px}.file-list li{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:10px;background:var(--surface2);border:1px solid rgba(255,255,255,.06);font-size:13px}.file-list span.name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.pill{font-size:11px;color:var(--muted);background:rgba(255,255,255,.06);border-radius:999px;padding:2px 7px}.viewer{min-height:520px;display:flex;flex-direction:column}.viewer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;color:var(--muted);font-size:13px}.pages{background:#0b0d12;border-radius:12px;border:1px solid var(--border);padding:18px;overflow:auto;min-height:460px;max-height:calc(100vh - 145px);display:flex;flex-direction:column;align-items:center;gap:16px}.page-wrap{background:white;box-shadow:0 6px 24px rgba(0,0,0,.45);position:relative}.page-wrap canvas{display:block}.page-num{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.65);color:white;border-radius:6px;padding:2px 7px;font-size:11px}.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.input{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;min-width:90px}.note{color:var(--muted);font-size:13px;line-height:1.5}.toast{position:fixed;right:20px;bottom:20px;background:#242a3d;border:1px solid var(--border);padding:11px 16px;border-radius:10px;opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1}@media(max-width:850px){.grid{grid-template-columns:1fr}.pages{max-height:none}}
</style></head><body><header><div class="logo">PDF<span>Merge</span></div><button class="btn" onclick="chooseFiles()">Add PDFs</button><button class="btn primary" onclick="mergePreview()">Merge & Preview</button><button class="btn green" id="saveBtn" onclick="saveMerged()" disabled>Save PDF</button><button class="btn danger" onclick="clearAll()">Clear</button></header><main><div class="grid"><section class="card"><div id="drop" class="drop" onclick="chooseFiles()" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFiles(event)"><h2>Drop PDFs here</h2><p>Add 2 or more PDF files. Preview first, then save.</p></div><input id="fileInput" type="file" accept=".pdf,application/pdf" multiple hidden onchange="addFiles(this.files);this.value=''"/><ul id="fileList" class="file-list"></ul><div class="actions"><button class="btn" onclick="chooseFiles()">Add PDFs</button><button class="btn primary" onclick="mergePreview()">Merge & Preview</button><button class="btn green" id="saveBtn2" onclick="saveMerged()" disabled>Save PDF</button></div><p class="note">Tip: use ↑ / ↓ to change order before merging.</p></section><section class="card viewer"><div class="viewer-head"><b>Preview</b><span id="status">No merged PDF yet</span></div><div id="pages" class="pages"><p class="note">Merged pages will appear here.</p></div></section></div></main><div id="toast" class="toast"></div><script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let files=[];let mergedBytes=null;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}function chooseFiles(){document.getElementById('fileInput').click()}function dragOver(e){e.preventDefault();document.getElementById('drop').classList.add('drag')}function dragLeave(e){document.getElementById('drop').classList.remove('drag')}function dropFiles(e){e.preventDefault();dragLeave(e);addFiles(e.dataTransfer.files)}async function addFiles(list){for(const f of list){if(f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf')){const buf=await f.arrayBuffer();files.push({name:f.name,bytes:new Uint8Array(buf)})}}mergedBytes=null;setSave(false);renderList();toast(files.length+' PDF(s) loaded')}function renderList(){const ul=document.getElementById('fileList');ul.innerHTML=files.map((f,i)=>`<li><span class="pill">${i+1}</span><span class="name">${escapeHtml(f.name)}</span><button class="btn" onclick="move(${i},-1)">↑</button><button class="btn" onclick="move(${i},1)">↓</button><button class="btn danger" onclick="removeFile(${i})">Remove</button></li>`).join('')}function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function move(i,d){const j=i+d;if(j<0||j>=files.length)return;[files[i],files[j]]=[files[j],files[i]];mergedBytes=null;setSave(false);renderList()}function removeFile(i){files.splice(i,1);mergedBytes=null;setSave(false);renderList()}function clearAll(){files=[];mergedBytes=null;renderList();setSave(false);document.getElementById('pages').innerHTML='<p class="note">Merged pages will appear here.</p>';document.getElementById('status').textContent='No merged PDF yet'}function setSave(v){document.getElementById('saveBtn').disabled=!v;document.getElementById('saveBtn2').disabled=!v}async function mergePreview(){if(files.length<2){toast('Add at least 2 PDFs');return}try{toast('Merging...');const {PDFDocument}=PDFLib;const out=await PDFDocument.create();for(const f of files){const src=await PDFDocument.load(f.bytes.slice(),{ignoreEncryption:true});const copied=await out.copyPages(src,src.getPageIndices());copied.forEach(p=>out.addPage(p))}mergedBytes=await out.save();setSave(true);await renderPreview(mergedBytes);toast('Merged preview ready')}catch(e){console.error(e);alert('Merge error: '+(e.stack||e.message));}}async function renderPreview(bytes){const pdf=await pdfjsLib.getDocument({data:new Uint8Array(bytes).slice().buffer}).promise;const holder=document.getElementById('pages');holder.innerHTML='';document.getElementById('status').textContent=pdf.numPages+' page(s)';for(let n=1;n<=pdf.numPages;n++){const page=await pdf.getPage(n);const vp=page.getViewport({scale:1.15});const wrap=document.createElement('div');wrap.className='page-wrap';const c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;wrap.appendChild(c);const lab=document.createElement('div');lab.className='page-num';lab.textContent=n;wrap.appendChild(lab);holder.appendChild(wrap);await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise}}function saveMerged(){if(!mergedBytes){toast('Preview merge first');return}const blob=new Blob([mergedBytes],{type:'application/pdf'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='merged.pdf';a.click();setTimeout(()=>URL.revokeObjectURL(url),3000)}
</script></body></html>
